# AprilTag ID → logical label → action mapping.
#
# tag 0 → RIGHT        (turn right at next opening)
# tag 1 → LEFT         (turn left at next opening)
# tag 2 → RIGHT_GREEN  (turn right, then follow green tiles)
# tag 3 → U_TURN       (180-degree turn)
# tag 4 → LEFT_ORANGE  (turn left, then follow orange tiles)

apriltag_handler:
  ros__parameters:
    tag_label_map_json:    '{"0": 1, "1": 2, "2": 3, "3": 4, "4": 5}'
    action_by_label_json:  '{"1": "RIGHT", "2": "LEFT", "3": "RIGHT_GREEN", "4": "U_TURN", "5": "LEFT_ORANGE"}'
    vote_window: 3
    pixel_tolerance: 20.0
    min_tag_px: 25
    tag_side_m: 0.15
    focal_length_px: 337.0
